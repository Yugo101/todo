<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
</head>
<body>
<div class="tasklist">
    <h2>タスク一覧</h2>
    <table>
        <thead>
        <tr>
            <th>タイトル</th>
            <th>完了</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td th:text="${task.title}"></td>
            <td th:text="${task.completed}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
