<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
</head>
<body>
<div class="tasklist">
    <h2>タスク一覧</h2>
    <a href="/tasks/new">タスク作成</a>
    <table>
        <thead>
        <tr>
            <th>タイトル</th>
            <th>優先度</th>
            <th>カテゴリー</th>
            <th>完了</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td th:text="${task.title}"></td>
            <td th:text="${task.priority.label}"></td>
            <td th:text="${task.category.label}"></td>
            <td th:text="${task.completed}"></td>
            <td>
            <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post">
                <button type="submit">削除</button>
            </form>
            </td>
            <td>
            <form th:action="@{/tasks/{id}/complete(id=${task.id})}" method="post">
                <button type="submit">完了</button>
            </form>
            </td>
            <td><a th:href="@{/tasks/{id}/edit(id=${task.id})}">タスク編集</a></td>
            <td><a th:href="@{/tasks/{id}(id=${task.id})}">タスク詳細</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
